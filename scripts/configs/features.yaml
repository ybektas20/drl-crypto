features:

  returns:                         # ----------------------------------------
    input_col: price_last
    transform: log                 # log | pct | raw
    lags: [5, 15, 60, 180, 600]
    agg_windows: [1]               # 1 ≡ no preliminary sum/mean
    norm:
      type: none

  buy_volume:                      # ----------------------------------------
    input_col: buy_qty
    lags: [0]                      # keep current value
    agg_windows: [5, 15, 60, 180, 600]        
    norm:
      type: zscore
      window: 100

  sell_volume:
    input_col: sell_qty
    lags: [0]
    agg_windows: [5, 15, 60, 180, 600]
    norm:
      type: zscore
      window: 100

  order_flow_imbalance:
    buy_col: buy_qty
    sell_col: sell_qty
    agg_windows: [5, 15, 60, 180, 600]         
    norm:
      type: minmax
      window: 300                  # min-max over previous 5 min

# global output settings -------------------------------------------
stack_axis: channel
dtype: float32
